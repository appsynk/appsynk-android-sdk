name: Generate GPG Signing Key

# Generates a GPG signing key on the runner and stores it DIRECTLY into this
# repository's encrypted Actions secrets. The private key and passphrase are
# never printed to the logs (only the public key id / fingerprint are shown,
# which are public information).
#
# Prerequisite: a repository secret named GPG_SECRETS_ADMIN_TOKEN holding a
# GitHub token allowed to WRITE Actions secrets (the built-in GITHUB_TOKEN
# cannot manage secrets). Use one of:
#   - a classic PAT with the `repo` scope, or
#   - a fine-grained PAT scoped to this repo with "Secrets: Read and write".
#
# On success it creates/updates these secrets:
#   SIGNING_KEY       base64 of the ASCII-armored private key (for in-memory signing)
#   SIGNING_PASSWORD  the key passphrase
#   SIGNING_KEY_ID    the long key id
#
# Trade-off: the key is generated on an ephemeral runner and only written to
# write-only secrets, so you keep NO local backup and cannot later export the
# key or a revocation certificate. Re-run to rotate, or generate the key locally
# if you need a backup / revocation certificate.

on:
  workflow_dispatch:
    inputs:
      name_real:
        description: "Key owner name"
        required: true
        default: "AppSynk"
      name_email:
        description: "Key owner email"
        required: true
        default: "contact@appsynk.io"
      keyserver:
        description: "Keyserver for the PUBLIC key (leave blank to skip publishing)"
        required: false
        default: "keyserver.ubuntu.com"

permissions:
  contents: read

jobs:
  generate-gpg:
    runs-on: ubuntu-latest
    steps:
      - name: Generate key, store secrets, publish public key
        env:
          GH_TOKEN: ${{ secrets.GPG_SECRETS_ADMIN_TOKEN }}
          REPO: ${{ github.repository }}
          NAME_REAL: ${{ inputs.name_real }}
          NAME_EMAIL: ${{ inputs.name_email }}
          KEYSERVER: ${{ inputs.keyserver }}
        run: |
          set -euo pipefail
          umask 077

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing repository secret GPG_SECRETS_ADMIN_TOKEN (a token allowed to write Actions secrets). See the comment at the top of this workflow."
            exit 1
          fi

          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"

          # Strong passphrase: lives only in this shell; masked in logs as a safety net.
          PASSPHRASE="$(openssl rand -base64 48 | tr -d '\n')"
          echo "::add-mask::$PASSPHRASE"

          # Generate an RSA 4096 primary + subkey, no expiry. Params file is in the
          # locked-down GNUPGHOME and shredded immediately after use.
          cat > "$GNUPGHOME/params" <<EOF
          Key-Type: RSA
          Key-Length: 4096
          Subkey-Type: RSA
          Subkey-Length: 4096
          Name-Real: ${NAME_REAL}
          Name-Email: ${NAME_EMAIL}
          Expire-Date: 0
          Passphrase: ${PASSPHRASE}
          %commit
          EOF
          gpg --batch --gen-key "$GNUPGHOME/params"
          shred -u "$GNUPGHOME/params" 2>/dev/null || rm -f "$GNUPGHOME/params"

          # Key id / fingerprint are PUBLIC information — safe to print.
          KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          FPR="$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr:/ {print $10; exit}')"
          echo "Generated key id=$KEY_ID fingerprint=$FPR"

          # Export the private key (base64). Held in a variable, masked, never echoed.
          SIGNING_KEY_B64="$(gpg --batch --pinentry-mode loopback --passphrase "$PASSPHRASE" \
                             --export-secret-keys --armor "$KEY_ID" | base64 -w 0)"
          echo "::add-mask::$SIGNING_KEY_B64"

          # Store secrets. GitHub encrypts them; values are piped via stdin, never logged.
          printf '%s' "$SIGNING_KEY_B64" | gh secret set SIGNING_KEY      --repo "$REPO"
          printf '%s' "$PASSPHRASE"      | gh secret set SIGNING_PASSWORD --repo "$REPO"
          printf '%s' "$KEY_ID"          | gh secret set SIGNING_KEY_ID   --repo "$REPO"
          echo "Stored secrets: SIGNING_KEY, SIGNING_PASSWORD, SIGNING_KEY_ID"

          # Publish ONLY the public key (Maven Central verifies signatures against it).
          if [ -n "${KEYSERVER:-}" ]; then
            if gpg --keyserver "$KEYSERVER" --send-keys "$KEY_ID"; then
              echo "Published public key $KEY_ID to $KEYSERVER"
            else
              echo "::warning::Could not publish to $KEYSERVER; publish later with: gpg --keyserver <ks> --send-keys $KEY_ID"
            fi
          fi

          rm -rf "$GNUPGHOME"
